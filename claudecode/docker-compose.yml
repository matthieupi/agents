services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    image: lab/claude-code:latest
    container_name: claude-code
    restart: unless-stopped

    user: "${UID:-1000}:${GID:-1000}"

    # Interactive terminal support
    stdin_open: true
    tty: true

    # Security settings - relaxed to allow sudo
    # Note: no-new-privileges and cap_drop ALL prevent sudo from working
    security_opt: []
    # cap_drop:
    #   - ALL
    read_only: false  # Needs write for git operations

    environment:
      - HOME=/home/claude
      - PATH=/home/claude/.local/bin:/usr/local/bin:/usr/bin:/bin
      # Anthropic API (required)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY required}

      # Claude Code specific
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
      - TERM=xterm-256color

      # Git config for commits
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-claude-xmist}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-claude@xmist.dev}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-claude-xmist}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-claude@xmist.dev}

      # Optional: disable telemetry
      - CLAUDE_CODE_DISABLE_TELEMETRY=${CLAUDE_CODE_DISABLE_TELEMETRY:-1}

    volumes:
      # Project workspace - mount your repos here
      - ${WORKSPACE_PATH:-./workspace}:/workspace:rw

      # Shared default resources from workspace root
      - ../agent:/opt/agent:rw

      # Harness-local startup wiring
      - ./init.sh:/opt/harness/init.sh:ro

      # Config persistence (settings, auth state)
      - ./.claude:/home/claude/.claude:rw

      # SSH directory for remote access
      - ${SSH_DIR_PATH:-./ssh}:/home/claude/.ssh:ro

      # Git config (optional)
      - ${GITCONFIG_PATH:-/dev/null}:/home/claude/.gitconfig:ro

    # Resource limits - bumped for headless Chromium (Playwright MCP)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

    networks:
      - devai-xmist

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Interactive TUI mode (default)
    # Access: docker exec -it claude-code claude
    entrypoint: ["bash", "-lc", "/opt/harness/init.sh && tail -f /dev/null"]

    # Alternative entrypoints:
    # entrypoint: ["claude"]                    # Direct TUI
    # entrypoint: ["claude", "--help"]          # One-shot help


networks:
  devai-xmist:
    external: true  # Assumes existing lab network
    # If standalone, uncomment:
    # driver: bridge
